<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imah Nini</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo">Imah Nini</div>
  <nav class="nav-menu" id="navMenu">
    <a href="#">Home</a>
    <a href="#menu">Menu</a>
    <a href="#cabang">Cabang</a>
    <a href="#about">Tentang</a>
    <a href="#contact">Kontak</a>
  </nav>
  <div class="hamburger" id="hamburger">☰</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">Selamat Datang di Imah Nini</h1>
  <p class="hero-subtitle">Masakan Sunda, Hangat Seperti Rumah</p>
</section>

<!-- MENU -->
<section id="menu" class="menu-section">
  <h2>Menu Kami</h2>
  <div class="menu-container" id="menuContainer"></div>
</section>

<!-- CABANG -->
<section id="cabang" class="branch-section">
  <h2>Cabang</h2>
  <div class="branch-container" id="branchContainer"></div>
</section>

<!-- ABOUT -->
<section id="about" class="about-section">
  <h2>Tentang Kami</h2>
  <p>Imah Nini menghadirkan suasana makan seperti di rumah nenek, alami dan hangat.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="contact-section">
  <h2>Kontak</h2>
  <form id="contactForm">
    <input type="text" placeholder="Nama" required>
    <input type="email" placeholder="Email" required>
    <textarea placeholder="Pesan" required></textarea>
    <button type="submit">Kirim</button>
  </form>
  <p id="formMessage"></p>
</section>

<script src="script.js"></script>
</body>
</html>
